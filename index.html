<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GMGN AI Trader V1.2.5 黑白名单过滤控制台
  <style>
    body {
      margin: 0;
      background: #070b12;
      color: #f4f7fb;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .page {
      max-width: 1150px;
      margin: auto;
      padding: 14px;
    }

    .hero {
      background: linear-gradient(135deg, #101827, #172033);
      border: 1px solid #243044;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }

    .hero p {
      color: #aebbd0;
      line-height: 1.7;
      margin: 8px 0;
    }

    .warning {
      background: rgba(255, 173, 51, 0.12);
      border: 1px solid rgba(255, 173, 51, 0.4);
      border-radius: 14px;
      padding: 12px;
      margin: 12px 0;
      color: #ffd38a;
      line-height: 1.6;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel {
      background: #111827;
      border: 1px solid #26344d;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .status-line {
      color: #aebbd0;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
    }

    .ok, .green {
      color: #81f0a4;
      font-weight: bold;
    }

    .bad, .red {
      color: #ff8b8b;
      font-weight: bold;
    }

    .mid, .yellow {
      color: #ffd38a;
      font-weight: bold;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin: 14px 0;
      flex-wrap: wrap;
    }

    select, button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
    }

    select {
      background: #111827;
      color: #fff;
      border: 1px solid #2b3a52;
    }

    button {
      background: #2f7cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #172033;
      border: 1px solid #2b3a52;
      color: #dce8ff;
    }

    button.danger-btn {
      background: #8b2f2f;
      color: white;
    }

    .status {
      color: #aebbd0;
      font-size: 14px;
      line-height: 1.7;
      margin: 12px 0;
    }

    .filterbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .chip {
      border-radius: 999px;
      padding: 8px 12px;
      background: #111827;
      border: 1px solid #2b3a52;
      color: #dce8ff;
      font-size: 13px;
      cursor: pointer;
    }

    .chip.active {
      background: #2f7cff;
      border-color: #2f7cff;
      color: white;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(285px, 1fr));
      gap: 14px;
    }

    .card {
      background: #111827;
      border: 1px solid #26344d;
      border-radius: 18px;
      padding: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .symbol {
      font-size: 20px;
      font-weight: bold;
      word-break: break-word;
    }

    .name {
      color: #aebbd0;
      font-size: 13px;
      margin-top: 4px;
      word-break: break-word;
    }

    .level {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: #222f45;
      white-space: nowrap;
    }

    .score {
      font-size: 36px;
      font-weight: bold;
      margin: 14px 0 4px;
    }

    .meta {
      color: #aebbd0;
      font-size: 14px;
      line-height: 1.8;
      word-break: break-word;
    }

    .reason {
      background: #0b1220;
      padding: 10px;
      border-radius: 12px;
      margin-top: 10px;
      color: #d9e2f1;
      font-size: 14px;
      line-height: 1.6;
    }

    .advice {
      margin-top: 12px;
      font-weight: bold;
      color: #8fd3ff;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .mini-btn {
      background: #172033;
      color: #dce8ff;
      border: 1px solid #2b3a52;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .logbox {
      background: #0b1220;
      border: 1px solid #26344d;
      border-radius: 14px;
      padding: 12px;
      color: #d9e2f1;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
    }

    .diag-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .diag-card {
      background: #0b1220;
      border: 1px solid #26344d;
      border-radius: 14px;
      padding: 12px;
    }

    .diag-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .diag-ok {
      border-color: rgba(129, 240, 164, 0.55);
    }

    .diag-bad {
      border-color: rgba(255, 139, 139, 0.45);
    }

    .tag {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
      background: #172033;
      color: #dce8ff;
      border: 1px solid #2b3a52;
    }

    .tag-ok {
      background: rgba(129, 240, 164, 0.12);
      color: #81f0a4;
      border-color: rgba(129, 240, 164, 0.4);
    }

    .tag-bad {
      background: rgba(255, 139, 139, 0.12);
      color: #ff8b8b;
      border-color: rgba(255, 139, 139, 0.4);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .summary-item {
      background: #0b1220;
      border: 1px solid #26344d;
      border-radius: 14px;
      padding: 10px;
    }

    .summary-num {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 20px;
      color: #8190a8;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="hero">
      <h1>GMGN AI Trader V1.2.5 黑名单过滤控制台</h1>
      <p>真实热门币风险扫描 + Telegram 精准提醒 + 未推送原因诊断。当前版本只提醒，不连接钱包，不自动买入。</p>
      <div class="warning">
        风险提醒：本工具只做风险辅助判断，不构成投资建议。Meme 币波动极大，可能归零。不要重仓跟买。
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>后端状态</h2>
        <div id="backendStatus" class="status-line">正在读取后端状态...</div>
      </div>

      <div class="panel">
        <h2>Telegram 状态</h2>
        <div id="telegramStatus" class="status-line">正在检查 Telegram 配置...</div>
      </div>

      <div class="panel">
        <h2>提醒规则</h2>
        <div id="rulesBox" class="status-line">正在读取提醒规则...</div>
      </div>
    </div>

    <div class="panel">
      <h2>控制台操作</h2>

      <div class="toolbar">
        <select id="chain">
          <option value="bsc">BSC</option>
          <option value="sol">Solana</option>
          <option value="eth">Ethereum</option>
          <option value="base">Base</option>
        </select>

        <button onclick="scan()">开始扫描</button>
        <button class="secondary" onclick="autoRefresh()">自动刷新</button>
        <button class="secondary" onclick="testTelegram()">测试 Telegram</button>
        <button class="secondary" onclick="runAlert(false)">手动推送提醒</button>
        <button class="danger-btn" onclick="runAlert(true)">强制测试推送</button>
      </div>

      <div id="status" class="status">等待操作...</div>

      <div class="filterbar">
        <div class="chip active" onclick="setFilter('all', this)">全部</div>
        <div class="chip" onclick="setFilter('safe', this)">只看低风险</div>
        <div class="chip" onclick="setFilter('watch', this)">观察区</div>
        <div class="chip" onclick="setFilter('danger', this)">高风险</div>
      </div>
    </div>

    <div class="panel">
      <h2>推送诊断</h2>
      <div id="diagnosticSummary" class="status-line">点击“手动推送提醒”或“强制测试推送”后显示诊断。</div>
      <div id="diagnosticList" class="diag-list"></div>
    </div>

    <div class="panel">
      <h2>操作结果</h2>
      <div id="consoleLog" class="logbox">暂无操作结果。</div>
    </div>

    <div id="cards" class="cards"></div>

    <div class="footer">
      当前版本：V1.2.5 黑名单 / 白名单过滤版。后续可升级：黑名单、白名单、持仓钱包追踪、GMGN 真实安全检测、自动止盈止损。
    </div>
  </div>

  <script>
    const API_BASE = "https://gmgn-ai-trader-v1-production-77e2.up.railway.app";

    let allTokens = [];
    let currentFilter = "all";
    let timer = null;
    let config = null;

    function money(v) {
      const n = Number(v || 0);
      if (!n) return "$0";
      if (n >= 1000000000) return "$" + (n / 1000000000).toFixed(2) + "B";
      if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
      if (n >= 1000) return "$" + (n / 1000).toFixed(2) + "K";
      return "$" + n.toFixed(2);
    }

    function price(v) {
      const n = Number(v || 0);
      if (!n) return "0";
      if (n < 0.000001) return n.toExponential(3);
      if (n < 0.01) return n.toPrecision(4);
      return n.toFixed(6);
    }

    function log(text, obj) {
      const box = document.getElementById("consoleLog");
      const now = new Date().toLocaleTimeString();

      if (obj) {
        box.innerText = `[${now}] ${text}\n\n` + JSON.stringify(obj, null, 2);
      } else {
        box.innerText = `[${now}] ${text}`;
      }
    }

    async function loadConfig() {
      try {
        const res = await fetch(`${API_BASE}/api/config`);
        const data = await res.json();
        config = data;

        document.getElementById("backendStatus").innerHTML = `
          后端版本：<span class="ok">${data.version || "-"}</span><br/>
          前端版本：<span class="ok">V1.2.5</span><br/>
          自动提醒：${data.autoAlert ? '<span class="ok">已开启</span>' : '<span class="bad">已关闭</span>'}<br/>
          扫描间隔：${data.scanIntervalSeconds || "-"} 秒<br/>
          已提醒缓存：${data.sentCacheSize || 0} 个
        `;

        document.getElementById("telegramStatus").innerHTML = `
          Telegram：${data.telegramConfigured ? '<span class="ok">已配置成功</span>' : '<span class="bad">未配置</span>'}<br/>
          当前模式：<span class="mid">只提醒，不自动买入</span>
        `;

        const r = data.rules || {};
        document.getElementById("rulesBox").innerHTML = `
          最低评分：<span class="ok">${r.minScore}</span><br/>
          最低流动性：<span class="ok">${money(r.minLiquidity)}</span><br/>
          最低24H量：<span class="ok">${money(r.minVolume24h)}</span><br/>
          1H涨幅范围：<span class="ok">${r.minChange1h}% ~ ${r.maxChange1h}%</span><br/>
          新盘时间：<span class="ok">${r.minAgeMinutes} ~ ${r.maxAgeMinutes} 分钟</span><br/>
          每次最多推送：<span class="ok">${r.maxAlertsPerRun}</span><br/>
          重复提醒冷却：<span class="ok">${r.cooldownHours} 小时</span>
        `;
      } catch (err) {
        document.getElementById("backendStatus").innerHTML = `<span class="bad">后端状态读取失败</span>`;
        document.getElementById("telegramStatus").innerHTML = `<span class="bad">Telegram 状态读取失败</span>`;
        document.getElementById("rulesBox").innerHTML = `<span class="bad">规则读取失败</span>`;
      }
    }

    function setFilter(type, el) {
      currentFilter = type;
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      el.classList.add("active");
      render();
    }

    function filteredTokens() {
      if (currentFilter === "safe") {
        return allTokens.filter(t => t.risk && t.risk.score >= 75);
      }
      if (currentFilter === "watch") {
        return allTokens.filter(t => t.risk && t.risk.score >= 50 && t.risk.score < 75);
      }
      if (currentFilter === "danger") {
        return allTokens.filter(t => t.risk && t.risk.score < 50);
      }
      return allTokens;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert("已复制合约地址");
      } catch (e) {
        alert(text);
      }
    }

    function render() {
      const cards = document.getElementById("cards");
      const list = filteredTokens();

      if (!list.length) {
        cards.innerHTML = `<div class="status">当前筛选条件下没有数据。</div>`;
        return;
      }

      cards.innerHTML = list.map(token => {
        const risk = token.risk || {};
        const score = Number(risk.score || 0);
        const scoreClass = score >= 75 ? "green" : score < 50 ? "red" : "yellow";

        return `
          <div class="card">
            <div class="top">
              <div>
                <div class="symbol">${token.symbol || "UNKNOWN"}</div>
                <div class="name">${token.name || ""}</div>
              </div>
              <div class="level">${risk.level || "未知"}</div>
            </div>

            <div class="score ${scoreClass}">${score}</div>
            <div class="meta">风险评分 / 100</div>

            <div class="meta">
              链：${token.chain || "-"}<br/>
              合约：${token.shortAddress || token.address || "-"}<br/>
              价格：${price(token.price)}<br/>
              流动性：${money(token.liquidity)}<br/>
              24H交易量：${money(token.volume24h)}<br/>
              前10持仓：${Number(token.top10HolderRate || 0).toFixed(2)}%<br/>
              1小时涨幅：${Number(token.priceChange1h || 0).toFixed(2)}%<br/>
              买税/卖税：${Number(token.buyTax || 0).toFixed(2)}% / ${Number(token.sellTax || 0).toFixed(2)}%<br/>
              新盘时间：${Number(token.ageMinutes || 0)} 分钟
            </div>

            <div class="reason">
              风险原因：${risk.reasons && risk.reasons.length ? risk.reasons.join("、") : "暂未发现明显高危项"}
            </div>

            <div class="advice">
              AI建议：${risk.advice || "仅供观察"}
            </div>

            <div class="actions">
              ${token.address ? `<button class="mini-btn" onclick="copyText('${token.address}')">复制合约</button>` : ""}
              ${token.gmgnUrl ? `<a class="mini-btn" href="${token.gmgnUrl}" target="_blank">打开 GMGN</a>` : ""}
              ${token.dexUrl ? `<a class="mini-btn" href="${token.dexUrl}" target="_blank">打开 Dex</a>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderDiagnostics(result) {
      const summary = document.getElementById("diagnosticSummary");
      const listBox = document.getElementById("diagnosticList");

      const diagnostics = result.diagnostics || [];
      const passed = diagnostics.filter(x => x.canSend).length;
      const failed = diagnostics.length - passed;

      summary.innerHTML = `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-num green">${result.total || 0}</div>
            <div class="status-line">扫描总数</div>
          </div>
          <div class="summary-item">
            <div class="summary-num green">${result.alertCandidates || 0}</div>
            <div class="status-line">符合候选</div>
          </div>
          <div class="summary-item">
            <div class="summary-num yellow">${result.selectedForSend || 0}</div>
            <div class="status-line">选中推送</div>
          </div>
          <div class="summary-item">
            <div class="summary-num green">${result.sentCount || 0}</div>
            <div class="status-line">已推送</div>
          </div>
          <div class="summary-item">
            <div class="summary-num green">${passed}</div>
            <div class="status-line">通过规则</div>
          </div>
          <div class="summary-item">
            <div class="summary-num red">${failed}</div>
            <div class="status-line">未通过规则</div>
          </div>
        </div>
      `;

      if (!diagnostics.length) {
        listBox.innerHTML = `<div class="status">暂无诊断数据。</div>`;
        return;
      }

      listBox.innerHTML = diagnostics.map(d => {
        const failedReasons = d.failed || [];
        const ok = d.canSend;

        return `
          <div class="diag-card ${ok ? "diag-ok" : "diag-bad"}">
            <div class="diag-title">${d.symbol || "UNKNOWN"}</div>

            <div>
              ${ok ? '<span class="tag tag-ok">符合推送</span>' : '<span class="tag tag-bad">未推送</span>'}
              <span class="tag">评分 ${d.score}</span>
              <span class="tag">流动性 ${money(d.liquidity)}</span>
              <span class="tag">24H量 ${money(d.volume24h)}</span>
              <span class="tag">1H ${Number(d.change1h || 0).toFixed(2)}%</span>
              <span class="tag">时间 ${Number(d.ageMinutes || 0)} 分钟</span>
            </div>

            <div class="reason">
              ${ok ? "原因：已符合当前精准提醒规则。" : "未推送原因：" + failedReasons.join("、")}
            </div>
          </div>
        `;
      }).join("");
    }

    async function scan() {
      const chain = document.getElementById("chain").value;
      const status = document.getElementById("status");

      status.innerText = "正在扫描 " + chain + " 热门代币...";
      document.getElementById("cards").innerHTML = "";

      try {
        const res = await fetch(`${API_BASE}/api/scan?chain=${chain}`);
        const data = await res.json();

        if (!data.ok) {
          status.innerText = "扫描失败：" + (data.message || "未知错误");
          log("扫描失败", data);
          return;
        }

        allTokens = data.tokens || [];

        status.innerText = `扫描完成｜版本：${data.version || "V1.2.3"}｜数据源：${data.source}｜数量：${allTokens.length}｜更新时间：${data.updateTime}`;

        log("扫描完成", {
          version: data.version,
          source: data.source,
          chain: data.chain,
          count: allTokens.length
        });

        render();
      } catch (err) {
        status.innerText = "请求失败，请检查 Railway 后端地址是否正确。";
        log("请求失败：" + err.message);
      }
    }

    async function testTelegram() {
      const status = document.getElementById("status");
      status.innerText = "正在发送 Telegram 测试消息...";

      try {
        const res = await fetch(`${API_BASE}/api/telegram/test`);
        const data = await res.json();

        if (data.ok) {
          status.innerText = "Telegram 测试成功，请查看机器人消息。";
        } else {
          status.innerText = "Telegram 测试失败。";
        }

        log("Telegram 测试结果", data);
        loadConfig();
      } catch (err) {
        status.innerText = "Telegram 测试请求失败。";
        log("Telegram 测试请求失败：" + err.message);
      }
    }

    async function runAlert(force) {
      const chain = document.getElementById("chain").value;
      const status = document.getElementById("status");

      status.innerText = force ? "正在强制测试推送..." : "正在执行精准提醒扫描...";

      try {
        const url = `${API_BASE}/api/alert/run?chain=${chain}${force ? "&force=1" : ""}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          status.innerText = "提醒扫描失败。";
          log("提醒扫描失败", data);
          return;
        }

        const result = data.result || {};

        status.innerText = `提醒扫描完成｜候选：${result.alertCandidates || 0}｜选中：${result.selectedForSend || 0}｜已推送：${result.sentCount || 0}`;

        renderDiagnostics(result);

        log(force ? "强制测试推送结果" : "精准提醒扫描结果", {
          chain: data.chain,
          source: result.source,
          total: result.total,
          alertCandidates: result.alertCandidates,
          selectedForSend: result.selectedForSend,
          sentCount: result.sentCount,
          sent: result.sent,
          failedSend: result.failedSend,
          rules: result.rules
        });

        loadConfig();
      } catch (err) {
        status.innerText = "提醒扫描请求失败。";
        log("提醒扫描请求失败：" + err.message);
      }
    }

    function autoRefresh() {
      if (timer) {
        clearInterval(timer);
        timer = null;
        alert("已关闭自动刷新");
        return;
      }

      scan();
      timer = setInterval(scan, 30000);
      alert("已开启自动刷新：每30秒刷新一次");
    }

    loadConfig();
    scan();
  </script>
</body>
</html>
